# ARPHost CF7 Submission Archive — open-source WordPress plugin pipeline
# No server deploys: validate -> security -> package -> manual deploy (WordPress.org SVN, GitHub release).
# This plugin is not part of the ARPHost infrastructure.

stages:
  - validate
  - security
  - package
  - deploy
  - release

variables:
  # MAIN_FILE is the actual main plugin PHP filename in this repo (unchanged
  # historically — renaming it would break activation on existing installs).
  # PLUGIN_SLUG is the WordPress-facing slug: it must match the Text Domain
  # header and becomes the folder name inside the packaged zip, since
  # WordPress Plugin Check compares Text Domain against the install folder
  # name. Keep these in sync with cf7-db-gsheets.php's Text Domain header.
  MAIN_FILE: "cf7-db-gsheets.php"
  PLUGIN_SLUG: "arphost-cf7-submission-archive"
  GIT_DEPTH: "0"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

.dev_runner:
  tags:
    - dev

php_lint:
  extends: .dev_runner
  stage: validate
  script:
    - PHP_BIN="$(command -v php || echo /usr/bin/php)"
    - |
      find . -name '*.php' -not -path './.git/*' -print0 | while IFS= read -r -d '' f; do
        "$PHP_BIN" -l "$f" || exit 1
      done
    - |
      HEADER_VERSION=$(grep -E '^\s*\*\s*Version:' "${MAIN_FILE}" | awk '{print $NF}')
      CONST_VERSION=$(grep -oE "CF7DBGS_VERSION', '[0-9.]+" "${MAIN_FILE}" | grep -oE '[0-9.]+$')
      STABLE_TAG=$(grep -E '^Stable tag:' readme.txt | awk '{print $NF}')
      echo "Header=${HEADER_VERSION} Const=${CONST_VERSION} StableTag=${STABLE_TAG}"
      [ "$HEADER_VERSION" = "$CONST_VERSION" ] && [ "$HEADER_VERSION" = "$STABLE_TAG" ] || { echo "Version mismatch"; exit 1; }
    - |
      TEXT_DOMAIN=$(grep -E '^\s*\*\s*Text Domain:' "${MAIN_FILE}" | awk '{print $NF}')
      echo "TextDomain=${TEXT_DOMAIN} PLUGIN_SLUG=${PLUGIN_SLUG}"
      [ "$TEXT_DOMAIN" = "$PLUGIN_SLUG" ] || { echo "Text Domain does not match PLUGIN_SLUG — Plugin Check will flag this wherever the plugin folder is named \${PLUGIN_SLUG}"; exit 1; }

semgrep_sast:
  extends: .dev_runner
  stage: security
  script:
    # semgrep is not installed on the dev runner host yet; skip with a warning
    # rather than blocking deploys. Trivy (below) remains the hard gate.
    - |
      if ! command -v semgrep >/dev/null; then
        echo "WARNING: semgrep not on runner PATH — skipping. Install it on the dev runner to enable this gate."
        echo '{"version":"15.0.6","vulnerabilities":[],"scan":{"status":"success","type":"sast","analyzer":{"id":"semgrep","name":"semgrep","version":"0","vendor":{"name":"skipped"}},"scanner":{"id":"semgrep","name":"semgrep","version":"0","vendor":{"name":"skipped"}},"start_time":"2026-01-01T00:00:00","end_time":"2026-01-01T00:00:00"}}' > gl-sast-report.json
        exit 0
      fi
      semgrep scan --config p/default --error --gitlab-sast --output gl-sast-report.json .
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json

gitleaks_secrets:
  extends: .dev_runner
  stage: security
  script:
    - |
      if ! command -v gitleaks >/dev/null; then
        echo "WARNING: gitleaks not on runner PATH — skipping. Install it on the dev runner to enable this gate."
        echo '[]' > gitleaks-report.json
        exit 0
      fi
      gitleaks detect --source . --redact --report-format json --report-path gitleaks-report.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gitleaks-report.json

trufflehog_secrets:
  extends: .dev_runner
  stage: security
  script:
    - |
      if ! command -v trufflehog >/dev/null; then
        echo "WARNING: trufflehog not on runner PATH — skipping. Install it on the dev runner to enable this gate."
        echo '[]' > trufflehog-report.json
        exit 0
      fi
      trufflehog filesystem --no-update --json --fail . | tee trufflehog-report.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trufflehog-report.json

trivy_repo_scan:
  extends: .dev_runner
  stage: security
  script:
    - trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --format json --output trivy-repo-report.json --exit-code 1 .
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trivy-repo-report.json

package_plugin:
  extends: .dev_runner
  stage: package
  script:
    - VERSION=$(grep -E '^\s*\*\s*Version:' "${MAIN_FILE}" | awk '{print $NF}')
    - echo "Packaging ${PLUGIN_SLUG} ${VERSION} (main file ${MAIN_FILE})"
    - rm -rf build && mkdir -p "build/${PLUGIN_SLUG}"
    - cp -r "${MAIN_FILE}" uninstall.php readme.txt LICENSE.txt google-apps-script-example.js includes admin "build/${PLUGIN_SLUG}/"
    - cd build && zip -rq "../${PLUGIN_SLUG}-${VERSION}.zip" "${PLUGIN_SLUG}"
  artifacts:
    expire_in: 1 week
    paths:
      - "${PLUGIN_SLUG}-*.zip"

# Deploy a tagged release to the WordPress.org plugin SVN repository.
# Manual and requires the plugin to already be APPROVED on WordPress.org —
# the SVN repo at plugins.svn.wordpress.org/${PLUGIN_SLUG} does not exist
# until then, so this job will fail with "repository not found" before that.
#
# Required CI/CD variables (Settings > CI/CD > Variables on this project):
#   SVN_USERNAME - WordPress.org username, case-sensitive (the forum/profile
#                  login, e.g. "hostalot" — NOT an email address).
#   SVN_PASSWORD - the WordPress.org *SVN-specific* password, generated at
#                  https://profiles.wordpress.org/me/profile/edit/group/3/?screen=svn-password
#                  (this is separate from the normal wordpress.org login
#                  password). Mark this variable both Protected and Masked.
# See: https://developer.wordpress.org/plugins/wordpress-org/how-to-use-subversion/
deploy_wordpress_svn:
  extends: .dev_runner
  stage: deploy
  needs: [package_plugin]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  environment:
    name: wordpress-org
    url: https://wordpress.org/plugins/${PLUGIN_SLUG}/
  script:
    - command -v svn >/dev/null || { echo "svn (Subversion) is not installed on this runner. Install it (e.g. apt-get install -y subversion) and re-run."; exit 1; }
    - '[ -n "$SVN_USERNAME" ] || { echo "SVN_USERNAME CI/CD variable not set — see job comments for setup."; exit 1; }'
    - '[ -n "$SVN_PASSWORD" ] || { echo "SVN_PASSWORD CI/CD variable not set — see job comments for setup."; exit 1; }'
    - VERSION=$(grep -E '^\s*\*\s*Version:' "${MAIN_FILE}" | awk '{print $NF}')
    - ZIP="${PLUGIN_SLUG}-${VERSION}.zip"
    - '[ -f "$ZIP" ] || { echo "Package artifact ${ZIP} missing — run package_plugin first."; exit 1; }'
    # Validate readme.txt against WordPress.org's own readme standard, using
    # their real validator (https://wordpress.org/plugins/developers/readme-validator/)
    # rather than reimplementing its rules. Fatal errors block the deploy;
    # warnings/notes are printed but non-blocking.
    - |
      set +e
      RV_HTML=$(curl -sS --fail-with-body --retry 3 --retry-delay 3 --retry-all-errors -X POST "https://wordpress.org/plugins/developers/readme-validator/" --data-urlencode "readme@readme.txt")
      RV_CURL_STATUS=$?
      set -e
      if [ "$RV_CURL_STATUS" -ne 0 ]; then
        echo "Could not reach the WordPress.org readme validator after retries (curl exit ${RV_CURL_STATUS}) — check runner network/DNS to wordpress.org and re-run."
        exit 1
      fi
      # NOTE: grep exits 1 when there are simply no matches (the common case
      # for a clean readme.txt — no <li> entries to find). Under this
      # runner's shell (errexit + pipefail both active), that non-zero exit
      # would silently kill the whole step. The trailing `|| true` on each
      # pipeline neutralizes that — RV_ERRORS/RV_WARNINGS just end up empty.
      RV_ERRORS=$(printf '%s' "$RV_HTML" | sed -n "/<ul class='errors'>/,/<\/ul>/p" | grep -oP "(?<=<li>).*?(?=</li>)" | sed -e 's/<[^>]*>//g' -e "s/&#8217;/'/g" -e 's/&#8220;/"/g' -e 's/&#8221;/"/g' -e 's/&#8211;/-/g' -e 's/&amp;/\&/g'; true)
      RV_WARNINGS=$(printf '%s' "$RV_HTML" | sed -n "/<ul class='warnings'>/,/<\/ul>/p" | grep -oP "(?<=<li>).*?(?=</li>)" | sed -e 's/<[^>]*>//g' -e "s/&#8217;/'/g" -e 's/&#8220;/"/g' -e 's/&#8221;/"/g' -e 's/&#8211;/-/g' -e 's/&amp;/\&/g'; true)
      if [ -n "$RV_WARNINGS" ]; then
        echo "readme.txt validator WARNINGS (non-blocking):"
        echo "$RV_WARNINGS" | sed 's/^/  - /'
      fi
      if [ -n "$RV_ERRORS" ]; then
        echo "readme.txt FAILED the WordPress.org readme validator:"
        echo "$RV_ERRORS" | sed 's/^/  - /'
        exit 1
      fi
      echo "readme.txt passed the WordPress.org readme validator."
    - echo "Deploying ${PLUGIN_SLUG} ${VERSION} to WordPress.org SVN"
    - SVN_URL="https://plugins.svn.wordpress.org/${PLUGIN_SLUG}"
    - rm -rf svn-work svn-release && mkdir svn-release
    - unzip -q "$ZIP" -d svn-release
    - svn co "$SVN_URL" svn-work --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive --trust-server-cert -q
    # If this version's tag already exists in SVN, this run is an assets/trunk
    # refresh (new screenshots, icon, banner) rather than a release — skip tag
    # creation instead of failing. A new plugin release still needs a version bump.
    - |
      TAG_EXISTS=""
      if [ -d "svn-work/tags/${VERSION}" ]; then
        TAG_EXISTS=1
        echo "Tag ${VERSION} already exists in SVN — deploying trunk/assets changes only, no new tag."
      fi
    # Sync trunk with this release's file set (mirrors package_plugin's file list).
    - rsync -a --delete "svn-release/${PLUGIN_SLUG}/" "svn-work/trunk/"
    # WordPress.org directory assets (screenshot-N.png, banner-*, icon-*) live in
    # the SVN assets/ folder — a sibling of trunk, never inside the plugin zip.
    # Screenshot numbering maps to the readme.txt "== Screenshots ==" captions.
    - mkdir -p svn-work/assets
    - '[ -d assets ] && rsync -a --delete assets/ svn-work/assets/ || echo "No assets/ directory in repo — skipping SVN assets sync."'
    - cd svn-work
    - svn add --force trunk assets --parents --depth infinity -q || true
    - svn status trunk assets | awk '/^!/ {print $2}' | xargs -r svn rm --force -q
    - |
      if [ -z "$TAG_EXISTS" ]; then
        svn cp trunk "tags/${VERSION}"
        COMMIT_MSG="Release ${VERSION}"
      else
        COMMIT_MSG="Update trunk/assets for ${VERSION} (tag already released)"
      fi
    - svn ci -m "$COMMIT_MSG" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive --no-auth-cache

# Open-source release: mirrors the repo to GitHub and publishes a release
# with the plugin zip attached. Manual and final.
# Uses the instance-level CI/CD variable:
#   GITHUB_PAT - GitHub PAT with contents:write on the repo
#   GITHUB_REPO  - defaults to arphost-com/CF7-Submissions
github_release:
  extends: .dev_runner
  stage: release
  needs: [package_plugin]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  environment:
    name: github
    url: https://github.com/arphost-com/CF7-Submissions/releases
  script:
    - '[ -n "$GITHUB_PAT" ] || { echo "GITHUB_PAT CI variable not set — refusing to release."; exit 1; }'
    - GITHUB_REPO="${GITHUB_REPO:-arphost-com/CF7-Submissions}"
    - VERSION=$(grep -E '^\s*\*\s*Version:' "${MAIN_FILE}" | awk '{print $NF}')
    - TAG="v${VERSION}"
    - ZIP="${PLUGIN_SLUG}-${VERSION}.zip"
    - '[ -f "$ZIP" ] || { echo "Package artifact ${ZIP} missing"; exit 1; }'
    # Mirror main to GitHub with the GitLab CI config stripped — .gitlab-ci.yml
    # is internal (runner/deploy details) and stays GitLab-only. The mirror is
    # always "GitLab main + one strip commit", recreated and force-pushed each
    # release, so GitHub main history rewrites on every run (it's a mirror, not
    # a collaboration branch). Never prints the token.
    - git rm -q --cached .gitlab-ci.yml
    - git -c user.name="ARPHost" -c user.email="barry@arphost.com" commit -q -m "Remove GitLab CI config from GitHub mirror"
    - git push --force --quiet "https://x-access-token:${GITHUB_PAT}@github.com/${GITHUB_REPO}.git" "HEAD:refs/heads/main"
    # Undo the strip commit so the runner workdir matches the GitLab commit again
    # (git rm --cached leaves the file on disk, so nothing is lost).
    - git reset -q --mixed HEAD~1
    # Create the release for this version (idempotent: reuse if the tag exists).
    - |
      AUTH="Authorization: Bearer ${GITHUB_PAT}"
      API="https://api.github.com/repos/${GITHUB_REPO}"
      RELEASE_ID=$(curl -sf -H "$AUTH" "${API}/releases/tags/${TAG}" | grep -m1 '"id":' | grep -oE '[0-9]+' | head -1 || true)
      if [ -z "$RELEASE_ID" ]; then
        RELEASE_ID=$(curl -sf -X POST -H "$AUTH" \
          -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"target_commitish\":\"main\",\"generate_release_notes\":true}" \
          "${API}/releases" | grep -m1 '"id":' | grep -oE '[0-9]+' | head -1)
      fi
      [ -n "$RELEASE_ID" ] || { echo "Could not create or find release ${TAG}"; exit 1; }
      echo "Release ${TAG} id=${RELEASE_ID}"
      curl -s -X POST -H "$AUTH" -H "Content-Type: application/zip" \
        --data-binary @"${ZIP}" \
        "https://uploads.github.com/repos/${GITHUB_REPO}/releases/${RELEASE_ID}/assets?name=${ZIP}" \
        -o /dev/null -w "asset upload HTTP %{http_code}\n"
