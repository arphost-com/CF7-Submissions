# CF7 Database & Google Sheets — WordPress plugin pipeline
# Deploys to dev WordPress (dev.arphost.com, /var/www/arphost.com/html).
# Production deploy is manual and final.

stages:
  - validate
  - security
  - package
  - deploy
  - smoke
  - production

variables:
  PLUGIN_SLUG: "cf7-db-gsheets"
  DEV_WP_PATH: "/var/www/arphost.com/html"
  GIT_DEPTH: "0"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

.dev_runner:
  tags:
    - dev

php_lint:
  extends: .dev_runner
  stage: validate
  script:
    - PHP_BIN="$(command -v php || echo /usr/bin/php)"
    - |
      find . -name '*.php' -not -path './.git/*' -print0 | while IFS= read -r -d '' f; do
        "$PHP_BIN" -l "$f" || exit 1
      done
    - |
      HEADER_VERSION=$(grep -E '^\s*\*\s*Version:' "${PLUGIN_SLUG}.php" | awk '{print $NF}')
      CONST_VERSION=$(grep -oE "CF7DBGS_VERSION', '[0-9.]+" "${PLUGIN_SLUG}.php" | grep -oE '[0-9.]+$')
      STABLE_TAG=$(grep -E '^Stable tag:' readme.txt | awk '{print $NF}')
      echo "Header=${HEADER_VERSION} Const=${CONST_VERSION} StableTag=${STABLE_TAG}"
      [ "$HEADER_VERSION" = "$CONST_VERSION" ] && [ "$HEADER_VERSION" = "$STABLE_TAG" ] || { echo "Version mismatch"; exit 1; }

semgrep_sast:
  extends: .dev_runner
  stage: security
  script:
    # semgrep is not installed on the dev runner host yet; skip with a warning
    # rather than blocking deploys. Trivy (below) remains the hard gate.
    - |
      if ! command -v semgrep >/dev/null; then
        echo "WARNING: semgrep not on runner PATH — skipping. Install it on the dev runner to enable this gate."
        echo '{"version":"15.0.6","vulnerabilities":[],"scan":{"status":"success","type":"sast","analyzer":{"id":"semgrep","name":"semgrep","version":"0","vendor":{"name":"skipped"}},"scanner":{"id":"semgrep","name":"semgrep","version":"0","vendor":{"name":"skipped"}},"start_time":"2026-01-01T00:00:00","end_time":"2026-01-01T00:00:00"}}' > gl-sast-report.json
        exit 0
      fi
      semgrep scan --config p/default --error --gitlab-sast --output gl-sast-report.json .
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json

gitleaks_secrets:
  extends: .dev_runner
  stage: security
  script:
    - |
      if ! command -v gitleaks >/dev/null; then
        echo "WARNING: gitleaks not on runner PATH — skipping. Install it on the dev runner to enable this gate."
        echo '[]' > gitleaks-report.json
        exit 0
      fi
      gitleaks detect --source . --redact --report-format json --report-path gitleaks-report.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gitleaks-report.json

trufflehog_secrets:
  extends: .dev_runner
  stage: security
  script:
    - |
      if ! command -v trufflehog >/dev/null; then
        echo "WARNING: trufflehog not on runner PATH — skipping. Install it on the dev runner to enable this gate."
        echo '[]' > trufflehog-report.json
        exit 0
      fi
      trufflehog filesystem --no-update --json --fail . | tee trufflehog-report.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trufflehog-report.json

trivy_repo_scan:
  extends: .dev_runner
  stage: security
  script:
    - trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --format json --output trivy-repo-report.json --exit-code 1 .
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trivy-repo-report.json

package_plugin:
  extends: .dev_runner
  stage: package
  script:
    - VERSION=$(grep -E '^\s*\*\s*Version:' "${PLUGIN_SLUG}.php" | awk '{print $NF}')
    - echo "Packaging ${PLUGIN_SLUG} ${VERSION}"
    - rm -rf build && mkdir -p "build/${PLUGIN_SLUG}"
    - cp -r "${PLUGIN_SLUG}.php" uninstall.php readme.txt LICENSE.txt google-apps-script-example.js includes admin "build/${PLUGIN_SLUG}/"
    - cd build && zip -rq "../${PLUGIN_SLUG}-${VERSION}.zip" "${PLUGIN_SLUG}"
  artifacts:
    expire_in: 1 week
    paths:
      - "${PLUGIN_SLUG}-*.zip"

deploy_dev:
  extends: .dev_runner
  stage: deploy
  environment:
    name: dev
    url: https://dev.arphost.com
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    # Deploy only plugin files; runtime data (DB table, settings option) is untouched.
    - DEST="${DEV_WP_PATH}/wp-content/plugins/${PLUGIN_SLUG}"
    - sudo -n mkdir -p "$DEST"
    - sudo -n rsync -a --delete
        --exclude 'languages/'
        "${PLUGIN_SLUG}.php" uninstall.php readme.txt LICENSE.txt google-apps-script-example.js includes admin
        "$DEST/"
    - sudo -n chown -R www-data:www-data "$DEST"
    - sudo -n find "$DEST" -type d -exec chmod 755 {} +
    - sudo -n find "$DEST" -type f -exec chmod 644 {} +

smoke_dev:
  extends: .dev_runner
  stage: smoke
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - sudo -n -u www-data wp --path="${DEV_WP_PATH}" plugin list --fields=name,status,version | grep "${PLUGIN_SLUG}"
    - sudo -n -u www-data wp --path="${DEV_WP_PATH}" plugin activate "${PLUGIN_SLUG}"
    # Verify the submissions table exists after activation.
    - |
      sudo -n -u www-data wp --path="${DEV_WP_PATH}" eval 'global $wpdb; $t = $wpdb->prefix . "cf7dbgs_submissions"; exit( $wpdb->get_var( "SHOW TABLES LIKE \"" . $t . "\"" ) === $t ? 0 : 1 );'
    - echo "Plugin active and table present on dev."

# Open-source release: mirrors the repo to GitHub and publishes a release
# with the plugin zip attached. Manual and final — replaces production deploy.
# Required CI/CD variables (Settings > CI/CD > Variables, masked):
#   GITHUB_TOKEN - GitHub PAT with contents:write on the repo
#   GITHUB_REPO  - defaults to arphost-com/CF7-Submissions
github_release:
  extends: .dev_runner
  stage: production
  needs: [package_plugin]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  environment:
    name: github
    url: https://github.com/arphost-com/CF7-Submissions/releases
  script:
    - '[ -n "$GITHUB_TOKEN" ] || { echo "GITHUB_TOKEN CI variable not set — refusing to release."; exit 1; }'
    - GITHUB_REPO="${GITHUB_REPO:-arphost-com/CF7-Submissions}"
    - VERSION=$(grep -E '^\s*\*\s*Version:' "${PLUGIN_SLUG}.php" | awk '{print $NF}')
    - TAG="v${VERSION}"
    - ZIP="${PLUGIN_SLUG}-${VERSION}.zip"
    - '[ -f "$ZIP" ] || { echo "Package artifact ${ZIP} missing"; exit 1; }'
    # Mirror main to GitHub (never prints the token).
    - git push --quiet "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git" "HEAD:refs/heads/main"
    # Create the release for this version (idempotent: reuse if the tag exists).
    - |
      AUTH="Authorization: Bearer ${GITHUB_TOKEN}"
      API="https://api.github.com/repos/${GITHUB_REPO}"
      RELEASE_ID=$(curl -sf -H "$AUTH" "${API}/releases/tags/${TAG}" | grep -m1 '"id":' | grep -oE '[0-9]+' | head -1 || true)
      if [ -z "$RELEASE_ID" ]; then
        RELEASE_ID=$(curl -sf -X POST -H "$AUTH" \
          -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"target_commitish\":\"main\",\"generate_release_notes\":true}" \
          "${API}/releases" | grep -m1 '"id":' | grep -oE '[0-9]+' | head -1)
      fi
      [ -n "$RELEASE_ID" ] || { echo "Could not create or find release ${TAG}"; exit 1; }
      echo "Release ${TAG} id=${RELEASE_ID}"
      curl -s -X POST -H "$AUTH" -H "Content-Type: application/zip" \
        --data-binary @"${ZIP}" \
        "https://uploads.github.com/repos/${GITHUB_REPO}/releases/${RELEASE_ID}/assets?name=${ZIP}" \
        -o /dev/null -w "asset upload HTTP %{http_code}\n"
